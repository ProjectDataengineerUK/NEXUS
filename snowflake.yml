definition_version: 1

native_app:
  name: NEXUS_AI_DATAOPS

  deploy_root: .snow/deploy/

  package:
    name: NEXUS_AI_DATAOPS_PKG
    role: ACCOUNTADMIN
    distribution: internal
    warehouse: NEXUS_COMPUTE_WH

  application:
    name: NEXUS_AI_DATAOPS_TEST
    role: ACCOUNTADMIN
    warehouse: NEXUS_COMPUTE_WH
    debug: true

  # snow CLI strip the src *parent* directory from the path before applying dest.
  # src: app/streamlit/  → strips "app/" → keeps "streamlit/..."  → dest "./" → "streamlit/..."
  # src: snowflake/cortex/agents/ → strips "snowflake/cortex/" → keeps "agents/..." → dest "cortex/" → "cortex/agents/..."
  # src: snowflake/models/ → strips "snowflake/" → keeps "models/..." → dest "./" → "models/..."
  artifacts:
    - src: snowflake/native_app/setup_script.sql
      dest: setup_script.sql
    - src: snowflake/native_app/manifest.yml
      dest: manifest.yml
    - src: snowflake/native_app/readme.md
      dest: readme.md
    - src: app/streamlit/
      dest: ./
    - src: snowflake/cortex/semantic_models/
      dest: cortex/
    - src: snowflake/cortex/agents/
      dest: cortex/
    - src: snowflake/cortex/stored_procedures/
      dest: cortex/
    - src: snowflake/models/
      dest: ./
