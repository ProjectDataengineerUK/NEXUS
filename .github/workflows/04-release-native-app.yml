name: "04 · Release — Native App Package"

# Disparo: git tag v*.*.* → empacota nova versão no Marketplace
# Exemplo: git tag v1.1.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version_label:
        description: "Versão do App (ex: 1.1.0)"
        required: true
      environment:
        description: "Conta Snowflake alvo"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

jobs:
  package-native-app:
    name: "Package Native App"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      contents: write   # necessário para criar GitHub Releases

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      VERSION_LABEL_INPUT: ${{ github.event.inputs.version_label }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Derivar versão
        id: version
        run: |
          if [ -n "$VERSION_LABEL_INPUT" ]; then
            VERSION="$VERSION_LABEL_INPUT"
          else
            # tag: v1.2.3 → 1_2_3
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          # Validação básica: apenas dígitos e pontos (evita input malformado propagar
          # para o slug da versão do Application Package)
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Versão inválida: '$VERSION' (esperado formato X.Y.Z)" >&2
            exit 1
          fi
          VERSION_SLUG=$(echo "$VERSION" | tr '.' '_')
          echo "label=$VERSION" >> $GITHUB_OUTPUT
          echo "slug=v${VERSION_SLUG}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (slug: v${VERSION_SLUG})"

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar snowflake-connector
        run: pip install snowflake-connector-python

      - name: Upload artefatos do Native App para stage
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role="ACCOUNTADMIN",
              warehouse="NEXUS_COMPUTE_WH",
          )
          cs = conn.cursor()

          # Garantir que o Application Package e seu stage existem antes do upload
          cs.execute("""
              CREATE APPLICATION PACKAGE IF NOT EXISTS NEXUS_AI_DATAOPS_PKG
                  COMMENT = 'NEXUS AI DataOps — Enterprise AI Command Center'
          """)
          cs.execute("""
              CREATE STAGE IF NOT EXISTS NEXUS_AI_DATAOPS_PKG.PUBLIC.APP_STAGE
                  DIRECTORY = (ENABLE = TRUE)
          """)

          VERSION = os.environ["APP_VERSION_SLUG"]
          STAGE   = f"@NEXUS_AI_DATAOPS_PKG.PUBLIC.APP_STAGE/{VERSION}"

          def collect(src_glob, src_base, stage_prefix):
              """Yield (local_path, stage_dest) pairs preserving relative structure."""
              for f in sorted(glob.glob(src_glob, recursive=True)):
                  if "__pycache__" in f:
                      continue
                  rel     = os.path.relpath(f, src_base)
                  rel_dir = os.path.dirname(rel)
                  dest    = f"{STAGE}/{stage_prefix}/{rel_dir}/" if rel_dir else f"{STAGE}/{stage_prefix}/"
                  yield f, dest

          files = [
              # ── Native App core ────────────────────────────────────────────────
              ("snowflake/native_app/manifest.yml",     f"{STAGE}/"),
              ("snowflake/native_app/setup_script.sql", f"{STAGE}/"),
              ("snowflake/native_app/readme.md",        f"{STAGE}/"),
          ]

          # ── Streamlit (pages + utils + config) ────────────────────────────────
          for pair in collect("app/streamlit/**/*.*", "app/streamlit", "streamlit"):
              files.append(pair)

          # ── Cortex: semantic models ────────────────────────────────────────────
          for pair in collect("snowflake/cortex/semantic_models/*.yaml",
                              "snowflake/cortex", "cortex"):
              files.append(pair)

          # ── Cortex: agents ─────────────────────────────────────────────────────
          for pair in collect("snowflake/cortex/agents/*.yaml",
                              "snowflake/cortex", "cortex"):
              files.append(pair)

          # ── Cortex: stored procedures (SQL) ───────────────────────────────────
          for pair in collect("snowflake/cortex/stored_procedures/*.sql",
                              "snowflake/cortex", "cortex"):
              files.append(pair)

          # ── Snowpark ML models ─────────────────────────────────────────────────
          for pair in collect("snowflake/models/*.py", "snowflake", "models"):
              files.append(pair)

          total = len(files)
          for i, (local_path, stage_path) in enumerate(files, 1):
              print(f"  [{i}/{total}] PUT {local_path} → {stage_path}")
              cs.execute(f"""
                  PUT file://{os.path.abspath(local_path)} {stage_path}
                  OVERWRITE = TRUE AUTO_COMPRESS = FALSE
              """)

          cs.close()
          conn.close()
          print("All artifacts uploaded.")
          EOF
        env:
          APP_VERSION_SLUG: ${{ steps.version.outputs.slug }}

      - name: Criar versão no Application Package
        run: |
          python - <<'EOF'
          import snowflake.connector, os

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role="ACCOUNTADMIN",
              warehouse="NEXUS_COMPUTE_WH",
          )
          cs = conn.cursor()

          VERSION_LABEL = os.environ["APP_VERSION_LABEL"]
          VERSION_SLUG  = os.environ["APP_VERSION_SLUG"]
          STAGE         = f"@NEXUS_AI_DATAOPS_PKG.PUBLIC.APP_STAGE/{VERSION_SLUG}"

          PKG = "NEXUS_AI_DATAOPS_PKG"

          def silent(sql):
              try: cs.execute(sql); return True
              except Exception as e: print(f"  [skip] {e}"); return False

          def remove_from_channel(vname):
              """Tenta remover versão do canal DEFAULT com múltiplos formatos de SQL."""
              for sql in [
                  f"ALTER APPLICATION PACKAGE {PKG} MODIFY RELEASE CHANNEL DEFAULT REMOVE VERSION {vname}",
                  f"ALTER APPLICATION PACKAGE {PKG} MODIFY RELEASE CHANNEL DEFAULT REMOVE {vname}",
                  f"ALTER APPLICATION PACKAGE {PKG} MODIFY RELEASE CHANNEL DEFAULT DROP VERSION {vname}",
              ]:
                  if silent(sql):
                      print(f"  Removed {vname} from DEFAULT channel")
                      return True
              return False

          # 1. Limpar versões existentes: remover do canal → deregistrar
          rows = cs.execute(f"SHOW VERSIONS IN APPLICATION PACKAGE {PKG}").fetchall()
          col  = [d[0].upper() for d in cs.description]
          for row in rows:
              vname = row[col.index("VERSION")]
              print(f"  Clearing {vname}...")
              remove_from_channel(vname)
              silent(f"ALTER APPLICATION PACKAGE {PKG} DEREGISTER VERSION {vname}")

          # 2. Registrar a versão nova
          cs.execute(
              f"ALTER APPLICATION PACKAGE {PKG} "
              f"REGISTER VERSION {VERSION_SLUG} "
              f"USING '{STAGE}' "
              f"LABEL = '{VERSION_LABEL}'"
          )

          # 3. Adicionar ao canal DEFAULT
          cs.execute(
              f"ALTER APPLICATION PACKAGE {PKG} "
              f"MODIFY RELEASE CHANNEL DEFAULT "
              f"ADD VERSION {VERSION_SLUG}"
          )

          print(f"Native App version {VERSION_SLUG} ({VERSION_LABEL}) released.")
          cs.close()
          conn.close()
          EOF
        env:
          APP_VERSION_LABEL: ${{ steps.version.outputs.label }}
          APP_VERSION_SLUG:  ${{ steps.version.outputs.slug }}

      - name: Testar instalação (dev account)
        if: github.event.inputs.environment == 'dev' || github.event_name == 'push'
        run: |
          python - <<'EOF'
          import snowflake.connector, os

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role="ACCOUNTADMIN",
              warehouse="NEXUS_COMPUTE_WH",
          )
          cs = conn.cursor()

          VERSION_SLUG = os.environ["APP_VERSION_SLUG"]

          # Remover instalação de teste anterior
          cs.execute("DROP APPLICATION IF EXISTS NEXUS_AI_DATAOPS_TEST CASCADE")

          # Instalar em debug mode
          cs.execute(f"""
              CREATE APPLICATION NEXUS_AI_DATAOPS_TEST
                  FROM APPLICATION PACKAGE NEXUS_AI_DATAOPS_PKG
                  USING VERSION {VERSION_SLUG}
                  DEBUG_MODE = TRUE
          """)

          print(f"Test installation successful: NEXUS_AI_DATAOPS_TEST ({VERSION_SLUG})")
          cs.close()
          conn.close()
          EOF
        env:
          APP_VERSION_SLUG: ${{ steps.version.outputs.slug }}

      - name: Criar GitHub Release
        if: github.event_name == 'push'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `NEXUS AI DataOps ${{ steps.version.outputs.label }}`,
              body: `## Snowflake Native App — v${{ steps.version.outputs.label }}\n\n` +
                    `**App Package:** \`NEXUS_AI_DATAOPS_PKG\`\n` +
                    `**Version slug:** \`${{ steps.version.outputs.slug }}\`\n\n` +
                    `### Instalar\n` +
                    `\`\`\`sql\n` +
                    `CREATE APPLICATION NEXUS_AI_DATAOPS\n` +
                    `  FROM APPLICATION PACKAGE NEXUS_AI_DATAOPS_PKG\n` +
                    `  USING VERSION ${{ steps.version.outputs.slug }};\n` +
                    `\`\`\``,
              draft: false,
              prerelease: false
            });
