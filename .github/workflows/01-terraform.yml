name: "01 · Terraform — Infraestrutura Snowflake"

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "terraform/**"
      - ".github/workflows/01-terraform.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.9.0"
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_REGION:  "us-central1"

jobs:
  # ── Plan: roda em todo PR e push ──────────────────────────────────────────────
  terraform-plan:
    name: "Plan (${{ matrix.env }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive -diff
        working-directory: terraform

      - name: Setup Python (checkov)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: IaC security scan (checkov)
        # Não bloqueante por ora: a maioria dos checks built-in do checkov mira
        # recursos AWS/Azure/GCP, cobertura para o provider Snowflake é limitada —
        # roda para visibilidade até termos uma baseline conhecida.
        run: |
          pip install checkov
          checkov -d terraform --compact --framework terraform || true
        working-directory: ${{ github.workspace }}

      - name: Autenticar no GCP (backend GCS)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id:       ${{ vars.GCP_PROJECT }}

      - name: Terraform Init
        env:
          SNOWFLAKE_ORGANIZATION_NAME: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}
          SNOWFLAKE_ACCOUNT_NAME:      ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
          SNOWFLAKE_USER:              ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:          ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          SNOWFLAKE_ORGANIZATION_NAME: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}
          SNOWFLAKE_ACCOUNT_NAME:      ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
          SNOWFLAKE_USER:              ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:          ${{ secrets.SNOWFLAKE_PASSWORD }}
          TF_VAR_snowflake_role: "ACCOUNTADMIN"
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.env }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...[truncado]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Apply dev: roda apenas no merge para main ─────────────────────────────────
  terraform-apply-dev:
    name: "Apply (dev)"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar no GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id:       ${{ vars.GCP_PROJECT }}

      - name: Terraform Init
        env:
          SNOWFLAKE_ORGANIZATION_NAME: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}
          SNOWFLAKE_ACCOUNT_NAME:      ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
          SNOWFLAKE_USER:              ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:          ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        env:
          SNOWFLAKE_ORGANIZATION_NAME: ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}
          SNOWFLAKE_ACCOUNT_NAME:      ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
          SNOWFLAKE_USER:              ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:          ${{ secrets.SNOWFLAKE_PASSWORD }}
          TF_VAR_snowflake_role: "ACCOUNTADMIN"
        run: terraform apply -auto-approve -input=false

  # ── Apply prod: roda apenas em tags v*.*.* ────────────────────────────────────
  terraform-apply-prod:
    name: "Apply (prod)"
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: prod

    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar no GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id:       ${{ vars.GCP_PROJECT }}

      - name: Terraform Init
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_PROD_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PROD_PASSWORD }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_PROD_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PROD_PASSWORD }}
          TF_VAR_snowflake_role: "SYSADMIN"
        run: terraform apply -auto-approve -input=false
