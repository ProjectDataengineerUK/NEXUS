name: "01 · Terraform — Infraestrutura Snowflake"

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "terraform/**"
      - ".github/workflows/01-terraform.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"

permissions:
  contents: read
  pull-requests: write        # para comentar o plan no PR
  id-token: write             # necessário para Workload Identity Federation (GCP)

env:
  TF_VERSION: "1.9.0"
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCP_REGION:  "us-central1"

jobs:
  # ── Plan: roda em todo PR e push ──────────────────────────────────────────────
  terraform-plan:
    name: "Plan (${{ matrix.env }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]   # adicionar prod quando tiver conta separada

    defaults:
      run:
        working-directory: terraform/environments/${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar no GCP (backend GCS)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id:                 ${{ vars.GCP_PROJECT }}

      - name: Terraform Init
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          TF_VAR_snowflake_role: "SYSADMIN"
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Comentar plan no PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/environments/${{ matrix.env }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n...[truncado]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — \`${{ matrix.env }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Apply dev: roda apenas no merge para main ─────────────────────────────────
  terraform-apply-dev:
    name: "Apply (dev)"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    defaults:
      run:
        working-directory: terraform/environments/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id:                 ${{ vars.GCP_PROJECT }}

      - name: Terraform Init
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          TF_VAR_snowflake_role: "SYSADMIN"
        run: terraform apply -auto-approve -input=false

  # ── Apply prod: roda apenas em tags v*.*.* ────────────────────────────────────
  terraform-apply-prod:
    name: "Apply (prod)"
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: prod   # exige aprovação manual no GitHub Environments

    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_PROD_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_PROD_SERVICE_ACCOUNT }}
          project_id:                 ${{ vars.GCP_PROJECT }}

      - name: Terraform Init
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_PROD_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PROD_PASSWORD }}
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Apply
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_PROD_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PROD_PASSWORD }}
          TF_VAR_snowflake_role: "SYSADMIN"
        run: terraform apply -auto-approve -input=false
