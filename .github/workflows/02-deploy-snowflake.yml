name: "02 · Deploy — Artefatos Snowflake"

# Roda após o terraform apply OU manualmente
on:
  workflow_run:
    workflows: ["01 · Terraform — Infraestrutura Snowflake"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      skip_sql:
        description: "Pular scripts SQL (apenas subir arquivos)"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy-dev:
    name: "Deploy artefatos (dev)"
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_DATABASE: NEXUS_APP
      SNOWFLAKE_ROLE:     ACCOUNTADMIN
      SNOWFLAKE_WAREHOUSE: NEXUS_COMPUTE_WH

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install snowflake-connector-python

      - name: Testar conexão Snowflake
        run: |
          python - <<'EOF'
          import snowflake.connector, os

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()
          cs.execute("SELECT CURRENT_ACCOUNT(), CURRENT_ROLE(), CURRENT_DATABASE()")
          row = cs.fetchone()
          print(f"Connected: account={row[0]}, role={row[1]}, database={row[2]}")
          cs.close()
          conn.close()
          EOF

      - name: Upload YAML configs (semantic model + agent)
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          files = glob.glob("snowflake/config/*.yaml")
          if not files:
              print("No YAML configs found — skipping.")
              exit(0)

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          for f in files:
              fname = os.path.basename(f)
              print(f"  uploading {fname}")
              cs.execute(f"""
                  PUT file://{f} @NEXUS_APP.CORE.SEMANTIC_STAGE
                  OVERWRITE = TRUE AUTO_COMPRESS = FALSE
              """)

          cs.close()
          conn.close()
          print("YAML configs uploaded.")
          EOF

      - name: Upload páginas Streamlit
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          files = glob.glob("app/streamlit/pages/*.py")
          home = "app/streamlit/Home.py"
          if os.path.exists(home):
              files.append(home)
          if not files:
              print("No Streamlit pages found — skipping.")
              exit(0)

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          for f in files:
              fname = os.path.basename(f)
              print(f"  uploading {fname}")
              cs.execute(f"""
                  PUT file://{f} @NEXUS_APP.CORE.APP_STAGE/streamlit/pages/
                  OVERWRITE = TRUE AUTO_COMPRESS = FALSE
              """)

          cs.close()
          conn.close()
          print("Streamlit pages uploaded.")
          EOF

      - name: Executar scripts SQL de setup
        if: ${{ github.event.inputs.skip_sql != 'true' }}
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          def split_sql(sql):
              """Split SQL into statements handling $$ blocks; strips -- and /**/ comments
              so that USE ROLE / USE DATABASE statements are detected even when preceded
              by comment-only lines."""
              stmts, cur = [], []
              i, n = 0, len(sql)
              in_dq = in_sq = in_lc = in_bc = False
              while i < n:
                  c = sql[i]
                  # Line comment: consume until newline; preserve only the newline
                  if in_lc:
                      if c == '\n':
                          in_lc = False
                          cur.append('\n')
                      i += 1
                      continue
                  # Block comment: consume until */; replace with single space
                  if in_bc:
                      if c == '*' and i+1 < n and sql[i+1] == '/':
                          i += 2; in_bc = False; cur.append(' ')
                      else:
                          i += 1
                      continue
                  # Dollar-quoted block: pass ALL chars through until closing $$
                  if in_dq:
                      if c == '$' and i+1 < n and sql[i+1] == '$':
                          cur.append('$$'); i += 2; in_dq = False
                      else:
                          cur.append(c); i += 1
                      continue
                  # Single-quoted string: pass through, handle '' escape
                  if in_sq:
                      if c == "'":
                          if i+1 < n and sql[i+1] == "'":
                              cur.append("''"); i += 2
                          else:
                              cur.append(c); i += 1; in_sq = False
                      else:
                          cur.append(c); i += 1
                      continue
                  # Top-level: detect openers — do NOT append comment markers to cur
                  if c == '-' and i+1 < n and sql[i+1] == '-':
                      in_lc = True; i += 2; continue
                  if c == '/' and i+1 < n and sql[i+1] == '*':
                      in_bc = True; i += 2; continue
                  if c == '$' and i+1 < n and sql[i+1] == '$':
                      in_dq = True; cur.append('$$'); i += 2; continue
                  if c == "'":
                      in_sq = True; cur.append(c); i += 1; continue
                  if c == ';':
                      s = ''.join(cur).strip()
                      if s: stmts.append(s)
                      cur = []; i += 1; continue
                  cur.append(c); i += 1
              if cur:
                  s = ''.join(cur).strip()
                  if s: stmts.append(s)
              return stmts

          scripts = sorted(glob.glob("snowflake/setup/*.sql"))
          if not scripts:
              print("No SQL setup scripts found — skipping.")
              exit(0)

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          IGNORABLE = ("already exists", "duplicate", "unique constraint",
                       "primary key constraint", "object already exists",
                       "already set", "already added", "already applied",
                       "already has",
                       "not available for trial",   # Cortex / premium features on trial
                       "not supported for trial",
                       "feature not enabled",
                       "unsupported feature",
                       "cortex search service",     # GRANT on skipped cortex search svc
                       "does not exist or not authorized",
                       "not found in stage",        # handler file missing (upload via 04-release)
                       "application package"        # Native App pkg not available on trial
                       )

          for script in scripts:
              print(f"  running {os.path.basename(script)}")
              with open(script) as f:
                  raw = f.read()
              for stmt in split_sql(raw):
                  stmt = stmt.strip()
                  if not stmt:
                      continue
                  if stmt.upper().startswith("USE "):
                      continue
                  try:
                      cs.execute(stmt)
                  except Exception as e:
                      err = str(e).lower()
                      if not any(ig in err for ig in IGNORABLE):
                          print(f"    WARNING in {os.path.basename(script)}: {e}")
                          raise

          cs.close()
          conn.close()
          print("Setup scripts executed.")
          EOF

  deploy-prod:
    name: "Deploy artefatos (prod)"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_PROD_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PROD_PASSWORD }}
      SNOWFLAKE_DATABASE: NEXUS_APP
      SNOWFLAKE_ROLE:     ACCOUNTADMIN
      SNOWFLAKE_WAREHOUSE: NEXUS_COMPUTE_WH

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install snowflake-connector-python
      - name: Deploy (reutiliza script)
        run: bash scripts/deploy_snowflake.sh
