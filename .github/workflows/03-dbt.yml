name: "03 · dbt — Pipeline de Transformação"

permissions:
  contents: read

on:
  # Agendado: todo dia às 04h UTC (após o churn pipeline das 03h)
  schedule:
    - cron: "0 4 * * *"

  # Manual: permite escolher target e seleção de modelos
  workflow_dispatch:
    inputs:
      target:
        description: "dbt target"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      select:
        description: "Modelos a executar (ex: staging, marts.customer_intelligence)"
        required: false
        default: ""
      full_refresh:
        description: "Full refresh (--full-refresh)"
        required: false
        default: false
        type: boolean

jobs:
  dbt-run:
    name: "dbt run + test (${{ github.event.inputs.target || 'dev' }})"
    runs-on: ubuntu-latest

    env:
      DBT_TARGET:          ${{ github.event.inputs.target || 'dev' }}
      DBT_SELECT:          ${{ github.event.inputs.select }}
      DBT_FULL_REFRESH:    ${{ github.event.inputs.full_refresh }}
      DBT_PROFILES_DIR:    .
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}

    defaults:
      run:
        working-directory: dbt

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dbt-snowflake
        run: pip install dbt-snowflake==1.8.* sqlfluff sqlfluff-templater-dbt

      - name: dbt deps
        run: dbt deps

      - name: Lint (sqlfluff)
        run: sqlfluff lint models --dialect snowflake || true

      - name: dbt debug
        run: dbt debug --target "$DBT_TARGET"

      - name: dbt run
        run: |
          ARGS=(--target "$DBT_TARGET")
          if [ -n "$DBT_SELECT" ]; then
            ARGS+=(--select "$DBT_SELECT")
          fi
          if [ "$DBT_FULL_REFRESH" = "true" ]; then
            ARGS+=(--full-refresh)
          fi
          dbt run "${ARGS[@]}"

      - name: dbt test
        run: |
          ARGS=(--target "$DBT_TARGET")
          if [ -n "$DBT_SELECT" ]; then
            ARGS+=(--select "$DBT_SELECT")
          fi
          dbt test "${ARGS[@]}"

      - name: dbt source freshness
        run: dbt source freshness --target "$DBT_TARGET"

      - name: Gerar docs dbt
        if: env.DBT_TARGET == 'prod'
        run: dbt docs generate --target prod

      - name: Upload artefatos dbt
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            dbt/target/run_results.json
            dbt/target/manifest.json
            dbt/target/catalog.json
          retention-days: 30

      - name: Sumário de resultados
        if: always()
        run: |
          python - <<'EOF'
          import json, os
          try:
              with open("target/run_results.json") as f:
                  results = json.load(f)
              passed = sum(1 for r in results["results"] if r["status"] in ["success", "pass"])
              failed = sum(1 for r in results["results"] if r["status"] in ["error", "fail"])
              print(f"dbt results: {passed} ok, {failed} falhou")
              if failed > 0:
                  for r in results["results"]:
                      if r["status"] in ["error", "fail"]:
                          print(f"  FAIL: {r['unique_id']}")
          except Exception as e:
              print(f"Não foi possível ler run_results.json: {e}")
          EOF
