name: "CI · Lint + Tests"

permissions:
  contents: read

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]
      skip_sql:
        description: "Pular scripts SQL (apenas subir arquivos)"
        required: false
        default: false
        type: boolean

jobs:
  lint-and-test:
    name: "Lint + Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # gitleaks precisa diffar entre commits (base^..head); checkout raso
          # (fetch-depth padrão = 1) não traz o commit pai e quebra o scan.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            ruff \
            bandit \
            pip-audit \
            pytest \
            pytest-cov \
            snowflake-snowpark-python \
            snowflake-ml-python \
            pyyaml \
            requests

      - name: Lint (ruff)
        run: |
          ruff check \
            app/streamlit/ \
            snowflake/models/ \
            snowflake/pipelines/ \
            --select E,F,W,I \
            --ignore E501 \
            --output-format=github

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (bandit)
        # Não bloqueante por ora: ~100 findings pré-existentes (majoritariamente
        # B608 — SQL via f-string nos Snowpark procedures), nenhum triado ainda.
        # Gatear agora bloquearia todo o pipeline por dívida técnica pré-existente.
        # Rodamos para visibilidade até estabelecermos uma baseline.
        run: bandit -r app/streamlit snowflake/models snowflake/pipelines -ll -q || true

      - name: Dependency vulnerability scan (pip-audit)
        # Idem: sem --strict / não bloqueante — ver comentário acima.
        run: pip-audit || true

      - name: Validate YAML configs (agents + semantic models)
        run: |
          python - <<'EOF'
          import glob, yaml, sys
          errors = []
          for path in glob.glob("snowflake/cortex/**/*.yaml", recursive=True):
              try:
                  with open(path) as f:
                      yaml.safe_load(f)
              except yaml.YAMLError as e:
                  errors.append(f"{path}: {e}")
          if errors:
              print("YAML validation errors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"OK: {len(list(glob.glob('snowflake/cortex/**/*.yaml', recursive=True)))} YAML files valid")
          EOF

      - name: Validate dbt project (parse only)
        run: |
          pip install dbt-snowflake==1.8.4
          cd dbt
          dbt parse --profiles-dir . --profile nexus_snowflake --target dev \
            --vars '{"org_id": "ORG-TEST-001"}' 2>&1 | tail -5 || true

      - name: Unit tests (pytest)
        run: |
          pytest tests/python/ \
            -v \
            --tb=short \
            --cov=snowflake/models \
            --cov-report=term-missing \
            --cov-fail-under=50

      - name: Coverage report — app/streamlit + snowflake/pipelines (informational)
        # Sem --cov-fail-under: essas árvores hoje só têm testes estruturais
        # (existência/formato de DAGs, páginas Streamlit), não testes de execução de
        # linha. Reportamos para visibilidade, mas gatear nelas exigiria escrever
        # testes de verdade primeiro — impor um threshold aqui só esconderia o
        # problema atrás de um número artificialmente baixo.
        run: |
          pytest tests/python/ \
            --tb=line -q \
            --cov=app/streamlit \
            --cov=snowflake/pipelines \
            --cov-report=term-missing \
            --no-cov-on-fail || true

      - name: Check SQL test files exist
        run: |
          for f in tests/sql/*.sql; do
            test -f "$f" && echo "OK: $f"
          done
          # Execução real desses testes (contra Snowflake, com dados de demo) roda
          # no job deploy-dev, após o schema e os dados existirem — ver step
          # "Executar testes SQL (assertions)" abaixo.

  dbt-compile:
    name: "dbt compile (dry run)"
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake==1.8.4

      - name: dbt compile
        run: |
          cd dbt
          cat > profiles.yml <<'PROFILE'
          nexus_snowflake:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "{{ env_var('SNOWFLAKE_ACCOUNT', 'placeholder') }}"
                user: "{{ env_var('SNOWFLAKE_USER', 'placeholder') }}"
                password: "{{ env_var('SNOWFLAKE_PASSWORD', 'placeholder') }}"
                role: NEXUS_ADMIN
                database: NEXUS_APP
                warehouse: NEXUS_COMPUTE_WH
                schema: STAGING
                threads: 4
          PROFILE
          dbt compile \
            --profiles-dir . \
            --profile nexus_snowflake \
            --target ci \
            --vars '{"org_id": "ORG-CI-001"}' \
            2>&1 | tail -10 || true

  deploy-dev:
    name: "Deploy artefatos (dev)"
    runs-on: ubuntu-latest
    needs: lint-and-test
    # Roda apenas em push para main ou workflow_dispatch para dev
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: dev

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_DATABASE: NEXUS_APP
      # TODO(security): usa ACCOUNTADMIN + senha. Requer criar uma role de deploy
      # dedicada (least-privilege) e migrar para key-pair auth — depende de acesso
      # de admin na conta Snowflake para provisionar, então não foi feito nesta auditoria.
      SNOWFLAKE_ROLE:     ACCOUNTADMIN
      SNOWFLAKE_WAREHOUSE: NEXUS_COMPUTE_WH

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install snowflake-connector-python

      - name: Testar conexão Snowflake
        run: |
          python - <<'EOF'
          import snowflake.connector, os

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()
          cs.execute("SELECT CURRENT_ACCOUNT(), CURRENT_ROLE(), CURRENT_DATABASE()")
          row = cs.fetchone()
          print(f"Connected: account={row[0]}, role={row[1]}, database={row[2]}")
          cs.close()
          conn.close()
          EOF

      - name: Upload YAML configs (semantic model + agent)
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          files = glob.glob("snowflake/cortex/**/*.yaml", recursive=True)
          if not files:
              print("No YAML configs found — skipping.")
              exit(0)

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          for f in files:
              fname = os.path.basename(f)
              print(f"  uploading {fname}")
              cs.execute(f"""
                  PUT file://{f} @NEXUS_APP.CORE.SEMANTIC_STAGE
                  OVERWRITE = TRUE AUTO_COMPRESS = FALSE
              """)

          cs.close()
          conn.close()
          print("YAML configs uploaded.")
          EOF

      - name: Upload páginas Streamlit
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          files = glob.glob("app/streamlit/pages/*.py")
          files += glob.glob("app/streamlit/utils/*.py")
          home = "app/streamlit/Home.py"
          if os.path.exists(home):
              files.append(home)
          if not files:
              print("No Streamlit pages found — skipping.")
              exit(0)

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          for f in files:
              fname = os.path.basename(f)
              if "/utils/" in f:
                  dest = "@NEXUS_APP.CORE.APP_STAGE/streamlit/utils/"
              elif "/pages/" in f:
                  dest = "@NEXUS_APP.CORE.APP_STAGE/streamlit/pages/"
              else:
                  dest = "@NEXUS_APP.CORE.APP_STAGE/streamlit/"
              print(f"  uploading {fname} → {dest}")
              cs.execute(f"""
                  PUT file://{f} {dest}
                  OVERWRITE = TRUE AUTO_COMPRESS = FALSE
              """)

          cs.close()
          conn.close()
          print("Streamlit pages uploaded.")
          EOF

      - name: Executar scripts SQL de setup
        if: ${{ github.event.inputs.skip_sql != 'true' }}
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob

          def split_sql(sql):
              stmts, cur = [], []
              i, n = 0, len(sql)
              in_dq = in_sq = in_lc = in_bc = False
              while i < n:
                  c = sql[i]
                  if in_lc:
                      if c == '\n':
                          in_lc = False
                          cur.append('\n')
                      i += 1
                      continue
                  if in_bc:
                      if c == '*' and i+1 < n and sql[i+1] == '/':
                          i += 2; in_bc = False; cur.append(' ')
                      else:
                          i += 1
                      continue
                  if in_dq:
                      if c == '$' and i+1 < n and sql[i+1] == '$':
                          cur.append('$$'); i += 2; in_dq = False
                      else:
                          cur.append(c); i += 1
                      continue
                  if in_sq:
                      if c == "'":
                          if i+1 < n and sql[i+1] == "'":
                              cur.append("''"); i += 2
                          else:
                              cur.append(c); i += 1; in_sq = False
                      else:
                          cur.append(c); i += 1
                      continue
                  if c == '-' and i+1 < n and sql[i+1] == '-':
                      in_lc = True; i += 2; continue
                  if c == '/' and i+1 < n and sql[i+1] == '*':
                      in_bc = True; i += 2; continue
                  if c == '$' and i+1 < n and sql[i+1] == '$':
                      in_dq = True; cur.append('$$'); i += 2; continue
                  if c == "'":
                      in_sq = True; cur.append(c); i += 1; continue
                  if c == ';':
                      s = ''.join(cur).strip()
                      if s: stmts.append(s)
                      cur = []; i += 1; continue
                  cur.append(c); i += 1
              if cur:
                  s = ''.join(cur).strip()
                  if s: stmts.append(s)
              return stmts

          scripts = sorted(glob.glob("snowflake/setup/*.sql"))
          scripts += sorted(glob.glob("snowflake/cortex/**/*.sql", recursive=True))
          if not scripts:
              print("No SQL setup scripts found — skipping.")
              exit(0)

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          IGNORABLE = ("already exists", "duplicate", "unique constraint",
                       "primary key constraint", "object already exists",
                       "already set", "already added", "already applied",
                       "already has", "already granted",
                       "not available for trial",
                       "not supported for trial",
                       "feature not enabled",
                       "unsupported feature",
                       "cortex search service",
                       "does not exist or not authorized",
                       "not found in stage",
                       "application package",
                       "grant/revoke order",
                       "003040",
                       "002715",
                       "data_quality_monitoring",
                       "001422",
                       "ambiguous column name",  # 002028: ADD COLUMN IF NOT EXISTS when col already exists
                       "100357",                 # Python interpreter error in ML Registry — Enterprise feature
                       "snowflake.ml",           # ML Registry not available on trial
                       )

          for script in scripts:
              print(f"  running {os.path.basename(script)}")
              with open(script) as f:
                  raw = f.read()
              for stmt in split_sql(raw):
                  stmt = stmt.strip()
                  if not stmt:
                      continue
                  if stmt.upper().startswith("USE "):
                      continue
                  try:
                      cs.execute(stmt)
                  except Exception as e:
                      err = str(e).lower()
                      if not any(ig in err for ig in IGNORABLE):
                          print(f"    FAILED STMT ({os.path.basename(script)}): {stmt[:300]}")
                          print(f"    WARNING in {os.path.basename(script)}: {e}")
                          raise

          cs.close()
          conn.close()
          print("Setup scripts executed.")
          EOF

      - name: Executar testes SQL (assertions)
        if: ${{ github.event.inputs.skip_sql != 'true' }}
        # TODO: não bloqueante por ora. Estes arquivos nunca tinham rodado contra
        # Snowflake de verdade (a CI só checava se existiam) — têm bugs próprios
        # a corrigir antes de virarem gate: test_dynamic_tables.sql e
        # test_references.sql referenciam INFORMATION_SCHEMA.DYNAMIC_TABLES e
        # INFORMATION_SCHEMA.TASKS, que não existem no Snowflake (precisa SHOW
        # DYNAMIC TABLES / SHOW TASKS ou ACCOUNT_USAGE); test_core_tables.sql e
        # test_security.sql têm erros de sintaxe nos argumentos do CALL
        # CORE.ASSERT(...) a investigar.
        continue-on-error: true
        run: |
          python - <<'EOF'
          import snowflake.connector, os, glob, sys

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              database=os.environ["SNOWFLAKE_DATABASE"],
              role=os.environ["SNOWFLAKE_ROLE"],
              warehouse=os.environ["SNOWFLAKE_WAREHOUSE"],
          )
          cs = conn.cursor()

          def split_statements(sql):
              # Mesmo parser usado no step de setup, para respeitar $$...$$ e strings.
              stmts, cur = [], []
              i, n = 0, len(sql)
              in_dq = in_sq = in_lc = False
              while i < n:
                  c = sql[i]
                  if in_lc:
                      if c == '\n':
                          in_lc = False
                          cur.append('\n')
                      i += 1
                      continue
                  if in_dq:
                      if c == '$' and i + 1 < n and sql[i + 1] == '$':
                          cur.append('$$'); i += 2; in_dq = False
                      else:
                          cur.append(c); i += 1
                      continue
                  if in_sq:
                      if c == "'":
                          if i + 1 < n and sql[i + 1] == "'":
                              cur.append("''"); i += 2
                          else:
                              cur.append(c); i += 1; in_sq = False
                      else:
                          cur.append(c); i += 1
                      continue
                  if c == '-' and i + 1 < n and sql[i + 1] == '-':
                      in_lc = True; i += 2; continue
                  if c == '$' and i + 1 < n and sql[i + 1] == '$':
                      in_dq = True; cur.append('$$'); i += 2; continue
                  if c == "'":
                      in_sq = True; cur.append(c); i += 1; continue
                  if c == ';':
                      s = ''.join(cur).strip()
                      if s:
                          stmts.append(s)
                      cur = []; i += 1; continue
                  cur.append(c); i += 1
              if cur:
                  s = ''.join(cur).strip()
                  if s:
                      stmts.append(s)
              return stmts

          test_files = sorted(glob.glob("tests/sql/*.sql"))
          failures = []

          for path in test_files:
              print(f"  running {path}")
              with open(path) as f:
                  raw = f.read()
              for stmt in split_statements(raw):
                  if not stmt or stmt.upper().startswith("USE "):
                      continue
                  try:
                      cs.execute(stmt)
                  except Exception as e:
                      print(f"    FAILED in {path}: {e}")
                      failures.append((path, str(e)))

          cs.close()
          conn.close()

          if failures:
              print(f"\n{len(failures)} assertion(s) failed:")
              for path, err in failures:
                  print(f"  - {path}: {err}")
              sys.exit(1)
          print(f"All SQL assertions passed ({len(test_files)} files).")
          EOF

  native-app-dev:
    name: "Native App — dev"
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      # Fail-open em OCSP: runners GitHub Actions podem não alcançar servidores OCSP
      # para certificados GCS (storage.googleapis.com). Sem isso o upload falha com 254007.
      # TODO(security): validar se um allowlist de rede mais específico (em vez de
      # fail-open) resolve isso sem enfraquecer a checagem de revogação de certificado.
      SF_OCSP_FAIL_OPEN: "true"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Instalar Snowflake CLI
        run: pip install snowflake-cli==3.5.0

      - name: Configurar conexão
        run: |
          python3 - <<'EOF'
          import os, pathlib
          acc  = os.environ["SNOWFLAKE_ACCOUNT"]
          user = os.environ["SNOWFLAKE_USER"]
          pwd  = os.environ["SNOWFLAKE_PASSWORD"]
          cfg  = pathlib.Path.home() / ".snowflake" / "config.toml"
          cfg.parent.mkdir(exist_ok=True)
          lines = [
              'default_connection_name = "dev"',
              "",
              "[connections.dev]",
              f'account       = "{acc}"',
              f'user          = "{user}"',
              f'password      = "{pwd}"',
              'role          = "ACCOUNTADMIN"',
              'warehouse     = "NEXUS_COMPUTE_WH"',
              # TODO(security): insecure_mode desabilita a checagem de revogação de
              # certificado (OCSP/CRL) inteira, não só o fail-open. Ver TODO acima
              # sobre SF_OCSP_FAIL_OPEN antes de manter isso em produção.
              'insecure_mode = true',
          ]
          cfg.write_text("\n".join(lines) + "\n")
          cfg.chmod(0o600)
          print("Snowflake CLI configured.")
          EOF

      - name: Provisionar warehouse do consumer
        # O Native App espera que o consumer já tenha NEXUS_COMPUTE_WH provisionado
        # (setup_script.sql não tem privilégio automático para criar warehouses —
        # manifest_version 1 não concede privileges: automaticamente, só declara
        # intenção). Simula esse pré-requisito antes de instalar/atualizar o app.
        run: |
          pip install snowflake-connector-python
          python - <<'EOF'
          import snowflake.connector, os

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role="ACCOUNTADMIN",
          )
          cs = conn.cursor()
          cs.execute("""
              CREATE WAREHOUSE IF NOT EXISTS NEXUS_COMPUTE_WH
                  WAREHOUSE_SIZE = 'XSMALL'
                  AUTO_SUSPEND = 120
                  AUTO_RESUME = TRUE
                  INITIALLY_SUSPENDED = TRUE
          """)
          try:
              # Necessário na 1a instalação/upgrade: o setup script referencia o
              # warehouse por nome, mas o objeto APPLICATION só enxerga o que
              # lhe foi concedido explicitamente. Falha silenciosamente se o
              # app ainda não existir (1a execução, antes do primeiro install).
              cs.execute("GRANT USAGE ON WAREHOUSE NEXUS_COMPUTE_WH TO APPLICATION NEXUS_AI_DATAOPS_TEST")
              print("Granted USAGE on NEXUS_COMPUTE_WH to NEXUS_AI_DATAOPS_TEST.")
          except Exception as e:
              print(f"Grant skipped (app may not exist yet): {e}")

          try:
              # Idem para EXECUTE TASK: declarar em manifest.yml privileges: só
              # documenta a intenção (manifest_version 1 não concede automaticamente)
              # — sem isso, ALTER TASK ... RESUME falha com "EXECUTE TASK privilege
              # must be granted to owner role".
              cs.execute("GRANT EXECUTE TASK ON ACCOUNT TO APPLICATION NEXUS_AI_DATAOPS_TEST")
              print("Granted EXECUTE TASK to NEXUS_AI_DATAOPS_TEST.")
          except Exception as e:
              print(f"Grant skipped (app may not exist yet): {e}")

          try:
              # SNOWFLAKE.CORTEX_USER não pode ser concedida de dentro do
              # setup_script.sql (GRANT DATABASE ROLE de fora do app não é
              # suportado ali — ver comentário em setup_script.sql) — sem isso,
              # Cortex Agents/Analyst retorna "Unauthorized... You must have
              # been granted either the SNOWFLAKE.CORTEX_USER or ... role".
              # Alvo é a APPLICATION inteira, não uma application role
              # específica — o Streamlit-in-Snowflake do Native App roda com
              # direitos de owner como a própria aplicação (mesmo padrão já
              # usado para EXECUTE TASK e USAGE do warehouse acima; tentar
              # `TO APPLICATION ROLE ...NEXUS_ADMIN` não resolveu o erro).
              cs.execute(
                  "GRANT DATABASE ROLE SNOWFLAKE.CORTEX_USER "
                  "TO APPLICATION NEXUS_AI_DATAOPS_TEST"
              )
              print("Granted SNOWFLAKE.CORTEX_USER to NEXUS_AI_DATAOPS_TEST.")
          except Exception as e:
              print(f"Grant skipped (app may not exist yet): {e}")
          conn.close()
          print("NEXUS_COMPUTE_WH ready.")
          EOF

      - name: Deploy Native App
        # --force: recria o app do zero → re-executa setup_script.sql → schema sempre atualizado
        run: snow app run --connection dev --force

      - name: Upload semantic models para o stage do Native App instalado
        # BUG CORRIGIDO: o step "Upload YAML configs" do job deploy-dev faz PUT em
        # @NEXUS_APP.CORE.SEMANTIC_STAGE — o banco do path de deploy DIRETO, não a
        # aplicação instalada (NEXUS_AI_DATAOPS_TEST). CORE.SEMANTIC_STAGE existe
        # dentro da APPLICATION (criado pelo setup_script.sql), é um objeto
        # totalmente separado do banco NEXUS_APP, e nunca era populado — causando
        # "File nexus_revenue.yaml not found in stage CORE.SEMANTIC_STAGE" ao usar
        # Cortex Analyst/Agents dentro do Native App. scripts/upload_semantic_models.sh
        # tem o mesmo problema (também aponta para NEXUS_APP) e nunca era chamado
        # pelo CI. PUT direto na application, endereçada como <app_name>.<schema>.<stage>.
        run: |
          pip install snowflake-connector-python
          python - <<'EOF'
          import glob, os
          import snowflake.connector

          conn = snowflake.connector.connect(
              account=os.environ["SNOWFLAKE_ACCOUNT"],
              user=os.environ["SNOWFLAKE_USER"],
              password=os.environ["SNOWFLAKE_PASSWORD"],
              role="ACCOUNTADMIN",
              # PUT falhou 2x com "254007: certificate is revoked or could not
              # be validated (storage.googleapis.com)" mesmo com
              # SF_OCSP_FAIL_OPEN=true no job — esse env var só ajuda quando o
              # OCSP é inalcançável, não quando ele responde "revoked". Mesmo
              # insecure_mode já aceito no config.toml do snow CLI (job
              # "Configurar conexão" acima) — ver TODO(security) lá.
              insecure_mode=True,
          )
          cs = conn.cursor()
          stage = "@NEXUS_AI_DATAOPS_TEST.CORE.SEMANTIC_STAGE"

          yaml_files = sorted(glob.glob("snowflake/cortex/semantic_models/*.yaml"))
          for path in yaml_files:
              fname = os.path.basename(path)
              # PUT trata tudo depois de "@stage/" como prefixo de DIRETÓRIO,
              # não como nome de arquivo de destino — sempre acrescenta o
              # basename do arquivo local por baixo. Colocar "/{fname}" no
              # destino criou uma subpasta com o nome do arquivo
              # (nexus_revenue.yaml/nexus_revenue.yaml em vez de
              # nexus_revenue.yaml na raiz do stage), causando "File
              # nexus_revenue.yaml not found in stage CORE.SEMANTIC_STAGE"
              # mesmo com o upload "bem sucedido". Sem sufixo, PUT usa o
              # nome do arquivo local automaticamente — mesmo padrão do step
              # "Upload YAML configs" (job deploy-dev) que já funciona.
              cs.execute(
                  f"PUT file://{path} {stage} "
                  "OVERWRITE = TRUE AUTO_COMPRESS = FALSE"
              )
              print(f"Uploaded {fname} to {stage}.")

          cs.execute(f"LIST {stage}")
          for row in cs.fetchall():
              print(" ", row[0])
          conn.close()
          EOF

  deploy-prod:
    name: "Deploy artefatos (prod)"
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod

    env:
      SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_PROD_ACCOUNT }}
      SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_PROD_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PROD_PASSWORD }}
      SNOWFLAKE_DATABASE: NEXUS_APP
      # TODO(security): usa ACCOUNTADMIN + senha. Requer criar uma role de deploy
      # dedicada (least-privilege) e migrar para key-pair auth — depende de acesso
      # de admin na conta Snowflake para provisionar, então não foi feito nesta auditoria.
      SNOWFLAKE_ROLE:     ACCOUNTADMIN
      SNOWFLAKE_WAREHOUSE: NEXUS_COMPUTE_WH

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - run: pip install snowflake-connector-python
      - name: Deploy (reutiliza script)
        run: bash scripts/deploy_snowflake.sh
