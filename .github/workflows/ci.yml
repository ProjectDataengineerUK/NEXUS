name: "CI · Lint + Tests"

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: "Lint + Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            ruff \
            pytest \
            pytest-cov \
            snowflake-snowpark-python \
            snowflake-ml-python \
            pyyaml \
            requests

      - name: Lint (ruff)
        run: |
          ruff check \
            app/streamlit/ \
            snowflake/models/ \
            snowflake/pipelines/ \
            --select E,F,W,I \
            --ignore E501 \
            --output-format=github

      - name: Validate YAML configs (agents + semantic models)
        run: |
          python - <<'EOF'
          import glob, yaml, sys
          errors = []
          for path in glob.glob("snowflake/cortex/**/*.yaml", recursive=True):
              try:
                  with open(path) as f:
                      yaml.safe_load(f)
              except yaml.YAMLError as e:
                  errors.append(f"{path}: {e}")
          if errors:
              print("YAML validation errors:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"OK: {len(list(glob.glob('snowflake/cortex/**/*.yaml', recursive=True)))} YAML files valid")
          EOF

      - name: Validate dbt project (parse only)
        run: |
          pip install dbt-snowflake==1.8.4
          cd dbt
          dbt parse --profiles-dir . --profile nexus_snowflake --target dev \
            --vars '{"org_id": "ORG-TEST-001"}' 2>&1 | tail -5 || true

      - name: Unit tests (pytest)
        run: |
          pytest tests/python/ \
            -v \
            --tb=short \
            --cov=snowflake/models \
            --cov-report=term-missing \
            --cov-fail-under=50

      - name: Check SQL test files exist
        run: |
          test -f tests/sql/test_core_tables.sql && echo "OK: test_core_tables.sql"
          test -f tests/sql/test_security.sql    && echo "OK: test_security.sql"

  dbt-compile:
    name: "dbt compile (dry run)"
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: pip install dbt-snowflake==1.8.4

      - name: dbt compile
        run: |
          cd dbt
          cat > profiles.yml <<'PROFILE'
          nexus_snowflake:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "{{ env_var('SNOWFLAKE_ACCOUNT', 'placeholder') }}"
                user: "{{ env_var('SNOWFLAKE_USER', 'placeholder') }}"
                password: "{{ env_var('SNOWFLAKE_PASSWORD', 'placeholder') }}"
                role: NEXUS_ADMIN
                database: NEXUS_APP
                warehouse: NEXUS_COMPUTE_WH
                schema: STAGING
                threads: 4
          PROFILE
          dbt compile \
            --profiles-dir . \
            --profile nexus_snowflake \
            --target ci \
            --vars '{"org_id": "ORG-CI-001"}' \
            2>&1 | tail -10 || true
