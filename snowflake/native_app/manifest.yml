manifest_version: 1

version:
  name: v2_0
  label: "2.0.0"
  comment: "NEXUS AI DataOps v2.0 — Data Onboarding, Multi-tenancy & KBS"

artifacts:
  setup_script: setup_script.sql
  readme: readme.md
  default_streamlit: CORE.NEXUS_UI

privileges:
  - EXECUTE TASK:
      description: "Necessário para rodar as tasks agendadas de churn scoring, briefing executivo e refresh do revenue score."
  - EXECUTE MANAGED TASK:
      description: "Necessário para o refresh automático das Dynamic Tables (MART/AI)."

references:
  - name: customer_table
    label: "Tabela de Clientes"
    description: >
      Mapeie sua tabela principal de clientes. Colunas minimas: customer_id, email, created_at.
      O NEXUS usa esta tabela para calcular churn score e health score.
    object_type: TABLE
    register_callback: core.register_reference
    required: false

  - name: transactions_table
    label: "Tabela de Transacoes"
    description: >
      Mapeie sua tabela de transacoes ou faturamento. Colunas minimas: transaction_id,
      customer_id, amount, created_at.
    object_type: TABLE
    register_callback: core.register_reference
    required: false

  - name: events_table
    label: "Tabela de Eventos de Produto"
    description: >
      Eventos de uso do produto para analise de engajamento. Colunas minimas:
      user_id, event_name, occurred_at.
    object_type: TABLE
    register_callback: core.register_reference
    required: false

configuration:
  log_level: INFO
  trace_level: OFF
