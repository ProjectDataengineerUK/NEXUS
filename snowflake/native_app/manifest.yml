manifest_version: 1

version:
  name: v1_0
  label: "1.0.0"
  comment: "NEXUS AI DataOps v1.0 — Enterprise AI Command Center for Snowflake"

artifacts:
  setup_script: setup_script.sql
  readme: readme.md
  default_streamlit: CORE.NEXUS_UI

privileges:
  - EXECUTE TASK
  - CREATE WAREHOUSE

references:
  - name: CUSTOMER_TABLE
    label: "Tabela de Clientes"
    description: "Tabela principal de clientes do consumer para integração com dados proprietários"
    object_type: TABLE
    multi_valued: false
    register_callback: CORE.REGISTER_REFERENCE
